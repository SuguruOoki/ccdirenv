name: Publish Homebrew Formula

# Pushes the cargo-dist-generated Homebrew formula (ccdirenv.rb) to the
# tap repo (SuguruOoki/homebrew-ccdirenv) on every release tag.
#
# Triggered by tag push (rather than `release: published`) because the
# release is created by cargo-dist using the workflow's GITHUB_TOKEN —
# release events from GITHUB_TOKEN do not start other workflows. The job
# polls until the GitHub Release exists, then publishes.
#
# Requires the HOMEBREW_TAP_TOKEN secret in this repo: a fine-grained PAT
# with Contents: Read & Write on SuguruOoki/homebrew-ccdirenv. Without it, the
# job exits early as a no-op.

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish (e.g. v0.3.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      REPO: ${{ github.repository }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Bail out if HOMEBREW_TAP_TOKEN is missing
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not set; skipping tap publish."
            exit 0
          fi

      - name: Wait for the GitHub Release to be published
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then exit 0; fi
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$REPO" --json isDraft,isPrerelease --jq '.isDraft' 2>/dev/null | grep -qx "false"; then
              echo "Release $TAG is published."
              exit 0
            fi
            echo "Waiting for release $TAG to be published... ($i/30)"
            sleep 30
          done
          echo "::error::Release $TAG was not published within 15 minutes."
          exit 1

      - name: Download formula from release
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then exit 0; fi
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern "ccdirenv.rb" \
            --output ccdirenv.rb
          test -s ccdirenv.rb

      - name: Push to SuguruOoki/homebrew-ccdirenv
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then exit 0; fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/SuguruOoki/homebrew-ccdirenv.git" tap
          mkdir -p tap/Formula
          cp ccdirenv.rb tap/Formula/ccdirenv.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ccdirenv.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "ccdirenv ${TAG}: bump formula"
          git push origin HEAD:main
